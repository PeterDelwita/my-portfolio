title: Dice Game
description: This was a website I created as part of my Create Task for the AP Computer Science Principles exam. Three dice are rolled (0 to 6 each, for a sum ranging from 0 to 18) and the user bets on whether the sum will be above, below, or exactly the same as the number he has betted. A card with the player's results is generated below the dice each time the player rolls them, stating the conditions of the bet and whether he has won or lost. The core problem was to create and run an algorithm (sequencing, selection, and iteration) and to create and add data to a list (game history). Vite and Tailwind were used to build this site, and Tailwind in particular was extremely helpful when doing the web design. DOM selectors and query selectors were used to handle events since Vite, unlike Vue, does not have features that replace those functions. The JavaScript file, the .html file, and the CSS files are all separate, but the CSS files are mostly empty since most of the web design was done with TailwindCSS. I use if statements to check if the number the user inputs is actually valid, and it even takes the type of bet into account (you can't bet numbers above 18, for example). After my if statements, a for loop was used to create the score cards, and backticks were used to contain the HTML that would be inserted into the dice container. An array variable, bet, is then created after if statements are used to determine whether the user has won, lost, or drew and it is pushed to bettingHistory. An array method (forEach) is used in the subsequent function loadHistory to show all of the score cards, and this function, along with the algorithm, is called each time the user places a bet. This site would be useful to someone looking to play a web game based on chance, or just looking to quench their boredom for a few minutes, and was created for the College Board for the AP CSP exam.
url: "https://dicenumbersgame.netlify.app/"
