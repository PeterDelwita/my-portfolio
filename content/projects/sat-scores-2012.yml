title: 2012 NYC SAT Scores
description: I used an API from New York City Open Data to display the average SAT scores by section (Critical Reading, Writing, Math) in 2012 for high schools in NYC. The problem I was trying to solve was to neatly display the average SAT scores of New York City schools based on certain filters, and I needed to use array methods and an async function to do this. The site allows the user to filter the results based on borough and based on scores. This was done by using the .filter and .forEach array methods, which themselves were used in the async function designed to pull from the API and display the cards based on the filters. The user can filter based on math, critical reading, writing, or all three at once. Looking back, I would have let the user select multiple borough filters at once on top of score filters (i.e. the user can filter schools from Brooklyn and Queens, with math scores above 300, all at once) and would have made the form more accessible for the user. TailwindCSS and Vite were used to make this project. The purpose of this project was to display the SAT test scores for 2012 in NYC to the user based on chosen conditions, and would be useful to someone gathering data on the SAT for this particular area as well as those researching schools, especially for this given year.
url: "https://nycsat2012.netlify.app/"
tags: ["TailwindCSS", "Vite", "JavaScript"]
date: "2024-12-10"
