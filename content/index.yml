about:
  title: "Technical Skills"
  description: |
    Languages: I started out using JavaScript, which I used for the majority of my AP Computer Science Principles (AP CSP) course before I switched to TypeScript at the end of the course. TypeScript makes it very easy to catch errors and its types and interfaces make it easy to describe data, so I've used it ever since.
    
    Frameworks: After I learned the basics of JavaScript, Vite served as my introduction to web development frameworks since a lot of them build onto Vite, and I learned how to use it as part of AP CSP before we transitioned to Vue. Vue, unlike Vite, allows for multiple pages in one application due to its router system and comes with single-file components (i.e. HTML, CSS, and JS in one file). Components can also be used anywhere in a Vue page, which makes them very convenient. I then switched to Nuxt come senior year, which is designed to be type-safe and takes care of importing for you. On top of that, Nuxt handles routing automatically, as far as I know.

    Tools: Visual Studio Code is my preferred coding editor, and I've used it ever since I started programming. I started using TailwindCSS a few months after learning JavaScript. TailwindCSS is much easier to work with than vanilla CSS since it allows you to write the CSS in the HTML class names, preventing you from having to leave your HTML, and I find it highly intuitive. I tend to use DaisyUI with it as well since I find the semantic class names and components very useful. I use Node.js (npm) as my package manager.
